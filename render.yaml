# Render Blueprint — import at https://dashboard.render.com/blueprints
# Or create a Web Service manually with the same settings (see README §4).
#
# plan: free is required for $0 deploy — without it Render defaults to starter ($7/mo)
# and may prompt for payment info during Blueprint import.
services:
  - type: web
    name: fintrack-api
    runtime: python
    plan: free
    rootDir: backend
    # Upgrade pip first; pinned deps (e.g. pydantic-core) lack Python 3.14 wheels.
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Render ignores Heroku-style runtime.txt; pin Python explicitly (default is 3.14.3).
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Optional:
      # - key: GROQ_MODEL
      #   sync: false
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: QUOTE_CACHE_TTL_SECONDS
      #   value: "90"
      # - key: QUOTE_FETCH_STAGGER_SEC
      #   value: "0.25"
